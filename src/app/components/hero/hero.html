<section class="relative overflow-hidden bg-[#0a0a14] min-h-screen">

  <!-- EAU REELLE des deux côtés -->
  <div class="water-container">
    <canvas class="water-canvas water-left" id="waterLeft"></canvas>
    <canvas class="water-canvas water-right" id="waterRight"></canvas>
  </div>

  <!-- Image fond : natural-size centered, don't upscale -->
  <img data-hero-bg src="assets/photo.png" alt="" class="hero-bg-img z-0">

  <!-- Overlay sombre -->
  <div class="absolute inset-0 z-0 hero-overlay" style="background: rgba(10,10,20,0.65);"></div>

  <!-- Étoiles -->
  <canvas id="starsCanvas" class="absolute inset-0 w-full h-full pointer-events-none z-10"></canvas>

  <!-- Contenu pyramide (texte fourni par l'utilisateur) -->
  <div class="relative z-20 h-full flex flex-col items-center justify-end py-40 px-6 text-center">

  <!-- VAGUES PISCINE (sans fond, juste les ondulations) -->
  <canvas id="waveCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;"></canvas>

  <style>
    /* ---- ANIMATIONS ---- */
    @keyframes revealSmooth {
      0%   { opacity:0; transform:translateY(100px) scale(0.85); filter:blur(15px); }
      60%  { opacity:1; transform:translateY(-10px) scale(1.02); filter:blur(3px); }
      100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
    }
    @keyframes fadeSoft {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes glowPulse {
      0%,100% { text-shadow: 0 0 10px rgba(0,245,160,0.3); }
      50%     { text-shadow: 0 0 35px rgba(0,245,160,0.7); }
    }
    @keyframes floatSoft {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-12px); }
    }

    /* ---- HERO LINES ---- */
    .hero-line {
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(80px) scale(0.9);
      filter: blur(12px);
      animation: revealSmooth 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .hero-line:hover {
      transform: scale(1.06);
      text-shadow: 0 0 40px rgba(0,217,245,0.9);
      transition: all 0.3s ease;
    }
    .line-1 {
      font-size: clamp(1rem, 2vw, 1.5rem);
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.3em;
    }
    .line-2 {
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      background: linear-gradient(90deg, #00f5a0, #00d9f5, #007cf0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .line-3, .line-4 {
      font-size: clamp(1rem, 2vw, 1.4rem);
      color: rgba(255,255,255,0.7);
    }
    .line-5 {
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      color: white;
      animation: revealSmooth 1.2s ease forwards, glowPulse 3s infinite !important;
    }
    .hero-motive {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeSoft 1s ease forwards;
    }

    /* ---- DELAYS ---- */
    .fly-in-1 .hero-line { animation-delay: 0.3s; }
    .fly-in-2 .hero-line { animation-delay: 0.6s; }
    .fly-in-3 .hero-line { animation-delay: 0.9s; }
    .fly-in-4 .hero-line { animation-delay: 1.2s; }
    .fly-in-5 .hero-line { animation-delay: 1.5s; }
    .hero-motive:nth-child(1) { animation-delay: 1.8s; }
    .hero-motive:nth-child(2) { animation-delay: 2.0s; }

    /* ---- TYPING CURSOR ---- */
    #typingWord {
      color: #00d9f5;
      border-right: 2px solid #00d9f5;
      padding-right: 3px;
      -webkit-text-fill-color: #00d9f5;
    }

    /* ---- FLOAT GLOBAL ---- */
    .hero-content {
      animation: floatSoft 6s ease-in-out infinite;
      position: relative;
      z-index: 10;
    }
  </style>

  <!-- TEXTES -->
  <div class="flex flex-col items-center gap-4 max-w-[1100px] px-4 hero-content">

    <div class="fly-in fly-in-1">
      <p class="hero-line line-1">bonjour je m'appelle</p>
    </div>

    <div class="fly-in fly-in-2">
      <p class="hero-line line-2">DEMBELE Innocent.</p>
    </div>

    <div class="fly-in fly-in-3">
      <p class="hero-line line-3">
        je suis <span id="typingWord"></span>
      </p>
    </div>

    <div class="fly-in fly-in-4">
      <p class="hero-line line-4">Pour tous vos projets,</p>
    </div>

    <div class="fly-in fly-in-5">
      <p class="hero-line line-5">contactez moi</p>
    </div>

    <div class="mt-6 text-center">
      <p class="hero-motive">Je construis des expériences soignées.</p>
      <p class="hero-motive">Responsive, rapides et faciles à maintenir.</p>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script>
    // ---- VAGUES PISCINE ----
    const canvas = document.getElementById('waveCanvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let t = 0;

    function drawWaves() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const totalWaves = 5;
      const baseAlpha  = 0.045;

      for (let i = 0; i < totalWaves; i++) {
        const yBase    = canvas.height * (0.3 + i * 0.14);
        const amp      = 18 + i * 6;
        const freq     = 0.008 - i * 0.001;
        const speed    = 0.6 + i * 0.3;
        const alpha    = baseAlpha + i * 0.018;

        ctx.beginPath();
        ctx.moveTo(0, canvas.height);

        for (let x = 0; x <= canvas.width; x += 3) {
          const y = yBase
            + Math.sin(x * freq + t * speed) * amp
            + Math.sin(x * freq * 1.7 + t * speed * 0.8 + i) * (amp * 0.5);
          ctx.lineTo(x, y);
        }

        ctx.lineTo(canvas.width, canvas.height);
        ctx.closePath();

        const grad = ctx.createLinearGradient(0, yBase - amp, 0, canvas.height);
        grad.addColorStop(0,   `rgba(0, 220, 255, ${alpha})`);
        grad.addColorStop(0.5, `rgba(0, 180, 200, ${alpha * 0.7})`);
        grad.addColorStop(1,   `rgba(0, 100, 160, ${alpha * 0.4})`);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      t += 0.012;
      requestAnimationFrame(drawWaves);
    }
    drawWaves();

    // ---- REALISTIC WATER SIMULATION (both sides) ----
    const waterLeft  = document.getElementById('waterLeft');
    const waterRight = document.getElementById('waterRight');
    if (!waterLeft || !waterRight) {
      console.warn('Water canvases not found');
    } else {
    const ctxL = waterLeft.getContext('2d');
    const ctxR = waterRight.getContext('2d');

    const waterParticles = [];
    const numParticles = 120;

    function resizeWaterCanvases() {
      const w = window.innerWidth / 2;
      const h = window.innerHeight;
      waterLeft.width  = w;
      waterLeft.height = h;
      waterRight.width = w;
      waterRight.height = h;
      waterLeft.style.width  = w + 'px';
      waterLeft.style.height = h + 'px';
      waterRight.style.width = w + 'px';
      waterRight.style.height = h + 'px';
    }
    resizeWaterCanvases();
    window.addEventListener('resize', resizeWaterCanvases);

    function createWaterParticles() {
      waterParticles.length = 0;
      for (let i = 0; i < numParticles; i++) {
        waterParticles.push({
          y: Math.random() * h * 0.7 + h * 0.3,
          x: Math.random() * w,
          radius: Math.random() * 3 + 1,
          speedY: -(Math.random() * 0.5 + 0.1),
          speedX: (Math.random() - 0.5) * 0.8,
          life: Math.random() * 0.5 + 0.5,
          maxLife: 1,
          isDrip: Math.random() > 0.7,
          waveOffset: Math.random() * Math.PI * 2
        });
      }
    }
    createWaterParticles();

    let waterTime = 0;

    function drawWaterSide(ctx, side) {
      const w = ctx.canvas.width;
      const h = ctx.canvas.height;
      
      ctx.clearRect(0, 0, w, h);

      const waterHeight = h * 0.75;
      
      const waterGrad = ctx.createLinearGradient(0, h - waterHeight, 0, h);
      waterGrad.addColorStop(0,   'rgba(0, 180, 240, 0.08)');
      waterGrad.addColorStop(0.3, 'rgba(0, 160, 220, 0.15)');
      waterGrad.addColorStop(0.6, 'rgba(0, 140, 210, 0.25)');
      waterGrad.addColorStop(0.8, 'rgba(0, 120, 200, 0.4)');
      waterGrad.addColorStop(1,   'rgba(0, 100, 190, 0.6)');

      ctx.beginPath();
      ctx.moveTo(0, h);
      ctx.lineTo(0, h - waterHeight);
      
      const waveAmp = 25;
      const waveFreq = 0.02;
      
      for (let x = 0; x <= w; x += 5) {
        const waveY = (h - waterHeight) 
          + Math.sin(x * waveFreq + waterTime * 1.5) * waveAmp * 0.5
          + Math.sin(x * waveFreq * 2.3 + waterTime * 2 + side * 2) * waveAmp * 0.3
          + Math.sin(x * waveFreq * 0.5 + waterTime) * waveAmp * 0.2;
        ctx.lineTo(x, waveY);
      }
      
      ctx.lineTo(w, h);
      ctx.closePath();
      ctx.fillStyle = waterGrad;
      ctx.fill();

      ctx.strokeStyle = 'rgba(100, 200, 255, 0.15)';
      ctx.lineWidth = 2;
      
      for (let i = 0; i < 8; i++) {
        const streamX = (w / 9) * (i + 1);
        ctx.beginPath();
        ctx.moveTo(streamX, h - waterHeight);
        
        for (let y = h - waterHeight; y < h; y += 8) {
          const offset = Math.sin(y * 0.03 + waterTime * 3 + i) * 15;
          ctx.lineTo(streamX + offset, y);
        }
        ctx.stroke();
      }

      ctx.globalCompositeOperation = 'screen';
      
      const highlightGrad = ctx.createLinearGradient(0, h - waterHeight - 20, 0, h - waterHeight + 30);
      highlightGrad.addColorStop(0, 'rgba(255, 255, 255, 0)');
      highlightGrad.addColorStop(0.3, `rgba(200, 240, 255, ${0.15 * Math.abs(Math.sin(waterTime * 0.5))})`);
      highlightGrad.addColorStop(0.7, 'rgba(255, 255, 255, 0)');
      highlightGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
      
      ctx.fillStyle = highlightGrad;
      ctx.beginPath();
      for (let x = 0; x <= w; x += 5) {
        const waveY = (h - waterHeight) + Math.sin(x * waveFreq + waterTime) * waveAmp;
        if (x === 0) ctx.moveTo(x, waveY);
        else ctx.lineTo(x, waveY);
      }
      ctx.lineTo(w, h - waterHeight);
      ctx.lineTo(0, h - waterHeight);
      ctx.closePath();
      ctx.fill();
      
      ctx.globalCompositeOperation = 'source-over';

      for (const p of waterParticles) {
        const px = side === 1 ? w - (p.x % w) : p.x;
        const screenY = p.y;
        
        const waveEffect = Math.sin(px * 0.02 + waterTime * 2 + p.waveOffset) * 3;
        
        p.y += p.speedY;
        p.x += p.speedX + waveEffect * 0.1;
        
        if (p.y < -p.radius) {
          p.y = h + p.radius;
          p.x = Math.random() * w;
        }
        if (p.x < -p.radius) p.x = w + p.radius;
        if (p.x > w + p.radius) p.x = -p.radius;
        
        const dropGrad = ctx.createRadialGradient(
          px - 1, screenY - 1, 0,
          px, screenY, Math.max(1, p.radius)
        );
        dropGrad.addColorStop(0, `rgba(255, 255, 255, ${0.3 * p.life})`);
        dropGrad.addColorStop(0.5, `rgba(180, 230, 255, ${0.15 * p.life})`);
        dropGrad.addColorStop(1, `rgba(0, 150, 240, 0)`);
        
        ctx.beginPath();
        ctx.arc(px, screenY, Math.max(0.5, p.radius), 0, Math.PI * 2);
        ctx.fillStyle = dropGrad;
        ctx.fill();
      }

      ctx.globalAlpha = 0.1;
      for (let i = 0; i < 5; i++) {
        const causticY = h - (i + 1) * 20;
        ctx.strokeStyle = `rgba(100, 220, 255, ${0.3 * Math.abs(Math.sin(waterTime + i))})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = 0; x <= w; x += 10) {
          const cy = causticY + Math.sin(x * 0.05 + waterTime * 2 + i) * 8;
          if (x === 0) ctx.moveTo(x, cy);
          else ctx.lineTo(x, cy);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function animateWater() {
      waterTime += 0.016;
      
      drawWaterSide(ctxL, 0);
      drawWaterSide(ctxR, 1);
      
      requestAnimationFrame(animateWater);
    }
    animateWater();
    }
    // ---- REALISTIC WATER SIMULATION (both sides) ----


    // ---- TYPING EFFECT ----
    const phrases = [
      'développeur web & mobile',
      'créateur d\'expériences UI',
      'passionné de code propre',
      'disponible pour vos projets'
    ];
    let pi = 0, ci = 0, deleting = false;
    const el = document.getElementById('typingWord');

    function type() {
      const word = phrases[pi];
      if (!deleting) {
        el.textContent = word.slice(0, ++ci);
        if (ci === word.length) { deleting = true; setTimeout(type, 1800); return; }
      } else {
        el.textContent = word.slice(0, --ci);
        if (ci === 0) { deleting = false; pi = (pi + 1) % phrases.length; }
      }
      setTimeout(type, deleting ? 45 : 90);
    }
    setTimeout(type, 1500);
  </script>

</div>
</section>
