<nav class="bg-white shadow-sm border-b border-gray-200 fixed top-0 left-0 right-0 z-50" style="height:70px;">
  <div class="max-w-6xl mx-auto px-8 h-full nav-grid" style="display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:1rem;">

    <!-- GAUCHE : badge + liens -->
    <div class="nav-left" style="display:flex; align-items:center; gap:2rem;">
      <!-- Badge Innocode -->
      <div style="display:flex;align-items:center;gap:0.4rem;flex-shrink:0;">
        <svg width="34" height="34" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="17" stroke="#00d9f5" stroke-width="2"/>
          <text x="18" y="14" text-anchor="middle" font-size="7" font-family="monospace" font-weight="bold" fill="#111">&lt;Inno</text>
          <text x="18" y="24" text-anchor="middle" font-size="7" font-family="monospace" font-weight="bold" fill="#00d9f5">Code/&gt;</text>
        </svg>
        <span style="font-family:monospace;font-weight:700;font-size:0.8rem;color:#111;">InnoCode</span>
      </div>

      <!-- Liens gauche -->
      @for (link of leftLinks; track link.label) {
        <button type="button" (click)="handleClick(link)"
                class="text-gray-800 hover:text-orange-500 text-sm font-semibold transition-colors whitespace-nowrap">
          {{ link.label }}
        </button>
      }
    </div>

    <!-- CENTRE : photo -->
    <button type="button" class="nav-center" (click)="handleClick({label:'Accueil', route:'/'} )"
            style="display:flex;align-items:center;justify-content:center;">
      <div style="width:52px;height:52px;border-radius:50%;border:4px solid #00d9f5;overflow:hidden;box-shadow:0 2px 8px rgba(0,217,245,0.3);">
        <img src="assets/photo.png" alt="Accueil" style="width:100%;height:100%;object-fit:cover;object-position:top;">
      </div>
    </button>

    <!-- DROITE : liens -->
    <div class="nav-right" style="display:flex; align-items:center; gap:2rem; justify-content:flex-end;">
      @for (link of rightLinks; track link.label) {
        <button type="button" (click)="handleClick(link)"
                class="text-gray-800 hover:text-orange-500 text-sm font-semibold transition-colors whitespace-nowrap">
          {{ link.label }}
        </button>
      }

      <!-- Mobile hamburger (hidden on desktop, visible on small screens) -->
      <button type="button" class="mobile-hamburger" aria-label="Menu">
        <svg viewBox="0 0 24 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="0" y="1" width="24" height="2" rx="1" fill="#1f2937" opacity="0.9"/>
          <rect x="0" y="8" width="24" height="2" rx="1" fill="#1f2937" opacity="0.9"/>
          <rect x="0" y="15" width="24" height="2" rx="1" fill="#1f2937" opacity="0.9"/>
        </svg>
      </button>
    </div>

  </div>
</nav>
