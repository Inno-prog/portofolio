<nav class="navbar">
  <div class="nav-inner">

    <!-- GAUCHE : badge + liens desktop -->
    <div class="nav-left">
      <div class="nav-brand" (click)="handleClick({label:'Accueil', route:'/'})">
        <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="17" stroke="#00d9f5" stroke-width="2"/>
          <text x="18" y="14" text-anchor="middle" font-size="7" font-family="monospace" font-weight="bold" fill="#111">&lt;Inno</text>
          <text x="18" y="24" text-anchor="middle" font-size="7" font-family="monospace" font-weight="bold" fill="#00d9f5">Code/&gt;</text>
        </svg>
        <span class="brand-text">InnoCode</span>
      </div>
      <div class="nav-links-left">
        @for (link of leftLinks; track link.label) {
          <button (click)="handleClick(link)" class="nav-link">{{ link.label }}</button>
        }
      </div>
    </div>

    <!-- CENTRE : photo -->
    <button class="nav-photo" (click)="handleClick({label:'Accueil', route:'/'})">
      <div class="photo-ring">
        <img src="assets/photo.jpeg" alt="Accueil">
      </div>
    </button>

    <!-- DROITE : liens desktop + hamburger mobile -->
    <div class="nav-right">
      <div class="nav-links-right">
        @for (link of rightLinks; track link.label) {
          <button (click)="handleClick(link)" class="nav-link">{{ link.label }}</button>
        }
      </div>
      <!-- Hamburger mobile -->
      <button class="hamburger" (click)="toggleMobile()" aria-label="Menu">
        @if (!mobileOpen) {
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M3 6h18M3 12h18M3 18h18" stroke="#111" stroke-width="2" stroke-linecap="round"/>
          </svg>
        } @else {
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M6 6l12 12M6 18L18 6" stroke="#111" stroke-width="2" stroke-linecap="round"/>
          </svg>
        }
      </button>
    </div>

  </div>

  <!-- Menu mobile déroulant -->
  @if (mobileOpen) {
    <div class="mobile-menu">
      @for (link of allLinks; track link.label) {
        <button (click)="handleClick(link)" class="mobile-link">{{ link.label }}</button>
      }
    </div>
  }
</nav>
